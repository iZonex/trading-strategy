<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bullGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1a73e8;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="deadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbc04;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#fbbc04;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="bearGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ea4335;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ea4335;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="600">Market Regime Zones by Average Long %</text>

  <!-- Zones -->
  <rect x="60" y="55" width="220" height="280" fill="url(#bullGrad)" rx="4" stroke="#1a73e8" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="290" y="55" width="220" height="280" fill="url(#deadGrad)" rx="4" stroke="#fbbc04" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="520" y="55" width="220" height="280" fill="url(#bearGrad)" rx="4" stroke="#ea4335" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Zone Labels -->
  <text x="170" y="85" text-anchor="middle" fill="#58a6ff" font-size="20" font-weight="700">BULL ZONE</text>
  <text x="170" y="108" text-anchor="middle" fill="#8b949e" font-size="13">avgLong &lt; 48%</text>
  <text x="170" y="128" text-anchor="middle" fill="#8b949e" font-size="12">16% of days (115d)</text>

  <text x="400" y="85" text-anchor="middle" fill="#d29922" font-size="20" font-weight="700">DEAD ZONE</text>
  <text x="400" y="108" text-anchor="middle" fill="#8b949e" font-size="13">avgLong 50-65%</text>
  <text x="400" y="128" text-anchor="middle" fill="#8b949e" font-size="12">44% of days (320d)</text>

  <text x="630" y="85" text-anchor="middle" fill="#f85149" font-size="20" font-weight="700">BEAR ZONE</text>
  <text x="630" y="108" text-anchor="middle" fill="#8b949e" font-size="13">avgLong &gt; 65%</text>
  <text x="630" y="128" text-anchor="middle" fill="#8b949e" font-size="12">22% of days (164d)</text>

  <!-- Models in each zone -->
  <text x="170" y="165" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="600">PB14-L</text>
  <text x="170" y="185" text-anchor="middle" fill="#8b949e" font-size="11">Bull Squeeze (LONG)</text>
  <text x="170" y="205" text-anchor="middle" fill="#3fb950" font-size="12">111 trades, 77% WR</text>

  <text x="400" y="158" text-anchor="middle" fill="#d29922" font-size="13" font-weight="600">PEND-S / PEND-L</text>
  <text x="400" y="175" text-anchor="middle" fill="#8b949e" font-size="11">Pendulum (spike fade)</text>
  <text x="400" y="198" text-anchor="middle" fill="#d29922" font-size="13" font-weight="600">PB14-S / DIST</text>
  <text x="400" y="215" text-anchor="middle" fill="#8b949e" font-size="11">Smart Money Exit</text>
  <text x="400" y="238" text-anchor="middle" fill="#d29922" font-size="13" font-weight="600">FLIQ-L</text>
  <text x="400" y="255" text-anchor="middle" fill="#8b949e" font-size="11">OI Exhaustion Bounce</text>

  <text x="630" y="165" text-anchor="middle" fill="#f85149" font-size="14" font-weight="600">PB12 / PB2</text>
  <text x="630" y="185" text-anchor="middle" fill="#8b949e" font-size="11">Cascade (SHORT)</text>
  <text x="630" y="205" text-anchor="middle" fill="#3fb950" font-size="12">76 trades, 68% WR</text>

  <!-- Scale at bottom -->
  <line x1="60" y1="350" x2="740" y2="350" stroke="#30363d" stroke-width="2"/>
  <text x="60" y="375" fill="#8b949e" font-size="12">30%</text>
  <text x="170" y="375" fill="#58a6ff" font-size="12" font-weight="600">48%</text>
  <text x="290" y="375" fill="#8b949e" font-size="12">50%</text>
  <text x="510" y="375" fill="#8b949e" font-size="12">65%</text>
  <text x="740" y="375" fill="#8b949e" font-size="12">80%</text>

  <!-- Threshold lines -->
  <line x1="280" y1="345" x2="280" y2="355" stroke="#58a6ff" stroke-width="2"/>
  <line x1="510" y1="345" x2="510" y2="355" stroke="#ea4335" stroke-width="2"/>

  <text x="400" y="395" text-anchor="middle" fill="#484f58" font-size="11">avgLong = (topTraderLong + globalLong) / 2</text>
</svg>