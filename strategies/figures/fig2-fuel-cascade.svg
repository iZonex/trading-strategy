<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="450" fill="#0d1117" rx="8"/>
  <text x="400" y="35" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="600">The Fuel-Cascade Mechanism</text>

  <!-- Phase boxes -->
  <!-- Phase 1: Loading -->
  <rect x="30" y="60" width="150" height="120" fill="#161b22" rx="6" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="105" y="85" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="700">1. FUEL LOADING</text>
  <text x="105" y="108" text-anchor="middle" fill="#8b949e" font-size="11">Positioning becomes</text>
  <text x="105" y="123" text-anchor="middle" fill="#8b949e" font-size="11">extreme (avgLong</text>
  <text x="105" y="138" text-anchor="middle" fill="#8b949e" font-size="11">&lt;48% or &gt;65%)</text>
  <text x="105" y="165" text-anchor="middle" fill="#3fb950" font-size="11">Stops accumulate</text>

  <!-- Arrow 1 -->
  <path d="M185 120 L215 120" stroke="#30363d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 2: Silence -->
  <rect x="220" y="60" width="150" height="120" fill="#161b22" rx="6" stroke="#d29922" stroke-width="1.5"/>
  <text x="295" y="85" text-anchor="middle" fill="#d29922" font-size="13" font-weight="700">2. SILENCE</text>
  <text x="295" y="108" text-anchor="middle" fill="#8b949e" font-size="11">Price quiet (&lt;2.5%</text>
  <text x="295" y="123" text-anchor="middle" fill="#8b949e" font-size="11">range). Positioning</text>
  <text x="295" y="138" text-anchor="middle" fill="#8b949e" font-size="11">stable. Barrel loaded.</text>
  <text x="295" y="165" text-anchor="middle" fill="#d29922" font-size="11">ENTRY POINT</text>

  <!-- Arrow 2 -->
  <path d="M375 120 L405 120" stroke="#30363d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 3: Trigger -->
  <rect x="410" y="60" width="150" height="120" fill="#161b22" rx="6" stroke="#f85149" stroke-width="1.5"/>
  <text x="485" y="85" text-anchor="middle" fill="#f85149" font-size="13" font-weight="700">3. TRIGGER</text>
  <text x="485" y="108" text-anchor="middle" fill="#8b949e" font-size="11">Small price move</text>
  <text x="485" y="123" text-anchor="middle" fill="#8b949e" font-size="11">hits stop cluster.</text>
  <text x="485" y="138" text-anchor="middle" fill="#8b949e" font-size="11">Forced liquidations</text>
  <text x="485" y="165" text-anchor="middle" fill="#f85149" font-size="11">CASCADE BEGINS</text>

  <!-- Arrow 3 -->
  <path d="M565 120 L595 120" stroke="#30363d" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Phase 4: Exhaustion -->
  <rect x="600" y="60" width="170" height="120" fill="#161b22" rx="6" stroke="#3fb950" stroke-width="1.5"/>
  <text x="685" y="85" text-anchor="middle" fill="#3fb950" font-size="13" font-weight="700">4. FUEL CONSUMED</text>
  <text x="685" y="108" text-anchor="middle" fill="#8b949e" font-size="11">avgLong shifts ~13pp.</text>
  <text x="685" y="123" text-anchor="middle" fill="#8b949e" font-size="11">Stops swept. No more</text>
  <text x="685" y="138" text-anchor="middle" fill="#8b949e" font-size="11">forced selling.</text>
  <text x="685" y="165" text-anchor="middle" fill="#3fb950" font-size="11">EXIT POINT</text>

  <!-- Example chart below -->
  <text x="400" y="215" text-anchor="middle" fill="#e6edf3" font-size="14" font-weight="600">Example: SHORT Cascade (avgLong &gt; 65%)</text>

  <!-- Price line -->
  <polyline points="60,240 100,242 140,238 180,240 200,241 220,236 240,234 260,270 280,290 300,310 320,320 340,330 360,335 380,340 400,338 420,342 440,345 460,342"
    fill="none" stroke="#f85149" stroke-width="2.5"/>

  <!-- avgLong line -->
  <polyline points="60,320 100,318 140,322 180,325 200,326 220,320 240,318 260,300 280,285 300,275 320,270 340,268 360,270 380,275 400,280 420,285 440,288 460,290"
    fill="none" stroke="#58a6ff" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Labels -->
  <text x="500" y="348" fill="#f85149" font-size="11">Price</text>
  <text x="500" y="293" fill="#58a6ff" font-size="11">avgLong</text>

  <!-- Phase markers -->
  <rect x="60" y="360" width="160" height="22" fill="#1a73e8" fill-opacity="0.15" rx="3"/>
  <text x="140" y="376" text-anchor="middle" fill="#58a6ff" font-size="10">Fuel Loading</text>

  <rect x="220" y="360" width="40" height="22" fill="#d29922" fill-opacity="0.15" rx="3"/>
  <text x="240" y="376" text-anchor="middle" fill="#d29922" font-size="10">Entry</text>

  <rect x="260" y="360" width="140" height="22" fill="#f85149" fill-opacity="0.15" rx="3"/>
  <text x="330" y="376" text-anchor="middle" fill="#f85149" font-size="10">Cascade</text>

  <rect x="400" y="360" width="60" height="22" fill="#3fb950" fill-opacity="0.15" rx="3"/>
  <text x="430" y="376" text-anchor="middle" fill="#3fb950" font-size="10">Exit</text>

  <!-- Annotation: 13pp shift -->
  <line x1="240" y1="318" x2="240" y2="290" stroke="#8b949e" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="400" y1="280" x2="400" y2="290" stroke="#8b949e" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="240" y1="290" x2="400" y2="290" stroke="#8b949e" stroke-width="1"/>
  <text x="320" y="285" text-anchor="middle" fill="#8b949e" font-size="10">avgLong shift ~13pp = fuel consumed</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#30363d"/>
    </marker>
  </defs>

  <text x="400" y="440" text-anchor="middle" fill="#484f58" font-size="11">Cascade ends mechanically when positioning rebalances, not by arbitrary TP/SL</text>
</svg>