<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="420" fill="#0d1117" rx="8"/>
  <text x="400" y="28" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">TopLong During Silence Predicts Pump Type &amp; Size</text>

  <!-- Chart area -->
  <line x1="80" y1="350" x2="720" y2="350" stroke="#30363d" stroke-width="1.5"/>
  <line x1="80" y1="60" x2="80" y2="350" stroke="#30363d" stroke-width="1.5"/>

  <text x="400" y="390" text-anchor="middle" fill="#8b949e" font-size="11">TopLong During Silence Period (%)</text>
  <text x="20" y="210" fill="#8b949e" font-size="10" text-anchor="middle" transform="rotate(-90 20 210)">Max Favorable Excursion (MFE)</text>

  <!-- X axis labels -->
  <text x="130" y="370" fill="#6e7681" font-size="10" text-anchor="middle">&lt;30%</text>
  <text x="250" y="370" fill="#6e7681" font-size="10" text-anchor="middle">30-40%</text>
  <text x="370" y="370" fill="#6e7681" font-size="10" text-anchor="middle">40-50%</text>
  <text x="490" y="370" fill="#6e7681" font-size="10" text-anchor="middle">50-60%</text>
  <text x="610" y="370" fill="#6e7681" font-size="10" text-anchor="middle">60-70%</text>

  <!-- Y axis labels -->
  <text x="70" y="350" fill="#6e7681" font-size="10" text-anchor="end">0%</text>
  <text x="70" y="276" fill="#6e7681" font-size="10" text-anchor="end">+20%</text>
  <text x="70" y="205" fill="#6e7681" font-size="10" text-anchor="end">+40%</text>
  <text x="70" y="134" fill="#6e7681" font-size="10" text-anchor="end">+60%</text>
  <text x="70" y="66" fill="#6e7681" font-size="10" text-anchor="end">+80%</text>

  <!-- Grid lines -->
  <line x1="80" y1="276" x2="720" y2="276" stroke="#1e1e1e" stroke-width="0.5"/>
  <line x1="80" y1="205" x2="720" y2="205" stroke="#1e1e1e" stroke-width="0.5"/>
  <line x1="80" y1="134" x2="720" y2="134" stroke="#1e1e1e" stroke-width="0.5"/>

  <!-- Bars: MFE by TopLong bucket -->
  <!-- <30% : MFE +73.3% -->
  <rect x="105" y="80" width="50" height="270" fill="#34d399" opacity="0.6" rx="3"/>
  <text x="130" y="75" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">+73%</text>
  <text x="130" y="345" text-anchor="middle" fill="#34d399" font-size="9">N=5</text>

  <!-- 30-40% : MFE +18.7% -->
  <rect x="225" y="282" width="50" height="68" fill="#60a5fa" opacity="0.6" rx="3"/>
  <text x="250" y="278" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">+19%</text>
  <text x="250" y="345" text-anchor="middle" fill="#60a5fa" font-size="9">N=18</text>

  <!-- 40-50% : MFE +19.4% (BEST PF) -->
  <rect x="345" y="280" width="50" height="70" fill="#fbbf24" opacity="0.7" rx="3"/>
  <text x="370" y="275" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">+19%</text>
  <text x="370" y="345" text-anchor="middle" fill="#fbbf24" font-size="9">N=19</text>
  <text x="370" y="260" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="700">BEST PF 4.2</text>

  <!-- 50-60% : MFE +19.2% -->
  <rect x="465" y="281" width="50" height="69" fill="#60a5fa" opacity="0.5" rx="3"/>
  <text x="490" y="277" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">+19%</text>
  <text x="490" y="345" text-anchor="middle" fill="#60a5fa" font-size="9">N=25</text>

  <!-- 60-70% : MFE +11.3% -->
  <rect x="585" y="310" width="50" height="40" fill="#ef4444" opacity="0.5" rx="3"/>
  <text x="610" y="306" text-anchor="middle" fill="#f87171" font-size="12" font-weight="700">+11%</text>
  <text x="610" y="345" text-anchor="middle" fill="#ef4444" font-size="9">N=38</text>
  <text x="610" y="295" text-anchor="middle" fill="#ef4444" font-size="9">PF 1.0 SKIP</text>

  <!-- Type labels -->
  <rect x="90" y="50" width="80" height="18" fill="#0f2818" rx="3"/>
  <text x="130" y="63" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">SQUEEZE</text>

  <rect x="320" y="50" width="100" height="18" fill="#1a1500" rx="3"/>
  <text x="370" y="63" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">BALANCED</text>

  <rect x="570" y="50" width="80" height="18" fill="#1a0808" rx="3"/>
  <text x="610" y="63" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">FOMO</text>

  <!-- Annotations -->
  <rect x="95" y="395" width="620" height="20" fill="#161b22" rx="3"/>
  <text x="405" y="410" text-anchor="middle" fill="#8b949e" font-size="10">Squeeze: wide trail (+8%), hold longer | Balanced: standard (+5%) | FOMO: tight trail (+3%) or skip</text>
</svg>
