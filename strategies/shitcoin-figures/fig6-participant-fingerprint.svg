<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="800" height="380" fill="#0d1117" rx="8"/>
  <text x="400" y="28" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">Participant Fingerprint: OI Elasticity vs Divergence Rate</text>

  <!-- Axes -->
  <line x1="100" y1="310" x2="750" y2="310" stroke="#30363d" stroke-width="1.5"/>
  <line x1="100" y1="60" x2="100" y2="310" stroke="#30363d" stroke-width="1.5"/>

  <text x="425" y="345" text-anchor="middle" fill="#8b949e" font-size="11">OI Elasticity (how much OI drops when price drops)</text>
  <text x="25" y="185" fill="#8b949e" font-size="10" text-anchor="middle" transform="rotate(-90 25 185)">OI-Price Divergence Rate (%)</text>

  <!-- X axis -->
  <text x="140" y="328" fill="#6e7681" font-size="10" text-anchor="middle">-0.5</text>
  <text x="260" y="328" fill="#6e7681" font-size="10" text-anchor="middle">0.0</text>
  <text x="380" y="328" fill="#6e7681" font-size="10" text-anchor="middle">0.5</text>
  <text x="500" y="328" fill="#6e7681" font-size="10" text-anchor="middle">1.0</text>
  <text x="620" y="328" fill="#6e7681" font-size="10" text-anchor="middle">1.5</text>

  <!-- Y axis -->
  <text x="90" y="280" fill="#6e7681" font-size="10" text-anchor="end">20%</text>
  <text x="90" y="220" fill="#6e7681" font-size="10" text-anchor="end">35%</text>
  <text x="90" y="160" fill="#6e7681" font-size="10" text-anchor="end">50%</text>
  <text x="90" y="100" fill="#6e7681" font-size="10" text-anchor="end">65%</text>

  <!-- 40% divergence threshold line -->
  <line x1="100" y1="190" x2="750" y2="190" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="755" y="188" fill="#fbbf24" font-size="10">Div = 40%</text>

  <!-- 0.5 elasticity threshold line -->
  <line x1="380" y1="60" x2="380" y2="310" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="385" y="55" fill="#fbbf24" font-size="10">Elast = 0.5</text>

  <!-- Quadrant labels -->
  <rect x="110" y="68" width="250" height="25" fill="#0f2818" rx="3" opacity="0.8"/>
  <text x="235" y="85" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">SMART MONEY (trade these)</text>

  <rect x="400" y="68" width="250" height="25" fill="#161b22" rx="3" opacity="0.8"/>
  <text x="525" y="85" text-anchor="middle" fill="#8b949e" font-size="11">High div but paper hands (?)</text>

  <rect x="110" y="255" width="250" height="25" fill="#161b22" rx="3" opacity="0.8"/>
  <text x="235" y="272" text-anchor="middle" fill="#8b949e" font-size="11">Low div, diamond hands (rare)</text>

  <rect x="400" y="255" width="260" height="25" fill="#1a0808" rx="3" opacity="0.8"/>
  <text x="530" y="272" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">RETAIL NOISE (skip these)</text>

  <!-- Coins plotted -->
  <!-- Smart money quadrant -->
  <circle cx="280" cy="152" r="9" fill="#34d399" opacity="0.8"/>
  <text x="280" y="140" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">SIREN</text>

  <circle cx="260" cy="158" r="8" fill="#34d399" opacity="0.8"/>
  <text x="245" y="148" text-anchor="middle" fill="#6ee7b7" font-size="9">SWARMS</text>

  <circle cx="270" cy="162" r="7" fill="#34d399" opacity="0.8"/>
  <text x="290" y="175" text-anchor="middle" fill="#6ee7b7" font-size="9">RED</text>

  <circle cx="265" cy="155" r="8" fill="#34d399" opacity="0.8"/>
  <text x="240" y="165" text-anchor="middle" fill="#6ee7b7" font-size="9">ZEC</text>

  <circle cx="275" cy="158" r="7" fill="#34d399" opacity="0.8"/>
  <text x="305" y="160" text-anchor="middle" fill="#6ee7b7" font-size="9">KERNEL</text>

  <!-- Institutions (high div, negative elasticity) -->
  <circle cx="170" cy="110" r="7" fill="#a855f7" opacity="0.7"/>
  <text x="170" y="100" text-anchor="middle" fill="#c084fc" font-size="9">COIN</text>

  <circle cx="195" cy="115" r="7" fill="#a855f7" opacity="0.7"/>
  <text x="195" y="105" text-anchor="middle" fill="#c084fc" font-size="9">HOOD</text>

  <circle cx="155" cy="120" r="6" fill="#a855f7" opacity="0.7"/>
  <text x="155" y="133" text-anchor="middle" fill="#c084fc" font-size="9">MSTR</text>

  <!-- FARTCOIN (high div, high elast = anomaly) -->
  <circle cx="505" cy="150" r="8" fill="#fbbf24" opacity="0.7"/>
  <text x="505" y="140" text-anchor="middle" fill="#fcd34d" font-size="9" font-weight="600">FARTCOIN*</text>

  <!-- Retail noise -->
  <circle cx="530" cy="250" r="6" fill="#ef4444" opacity="0.6"/>
  <text x="530" y="243" text-anchor="middle" fill="#f87171" font-size="8">BEAT</text>

  <circle cx="560" cy="260" r="5" fill="#ef4444" opacity="0.6"/>
  <text x="560" y="253" text-anchor="middle" fill="#f87171" font-size="8">4U</text>

  <circle cx="545" cy="255" r="5" fill="#ef4444" opacity="0.6"/>
  <text x="545" y="270" text-anchor="middle" fill="#f87171" font-size="8">POWER</text>

  <circle cx="570" cy="248" r="5" fill="#ef4444" opacity="0.6"/>
  <text x="580" y="243" text-anchor="middle" fill="#f87171" font-size="8">ACE</text>

  <circle cx="590" cy="240" r="5" fill="#ef4444" opacity="0.6"/>
  <text x="600" y="255" text-anchor="middle" fill="#f87171" font-size="8">RIVER</text>

  <!-- Footnote -->
  <text x="400" y="370" text-anchor="middle" fill="#6e7681" font-size="9">*FARTCOIN: high divergence (53%) but OI Predictive Power = 49% (coin flip) — false positive</text>
</svg>
